<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="KhomDev DeFi Tracker: Advanced Web3 portfolio monitoring, real-time crypto analytics, and AI-powered market predictions using Python & CoinGecko.">
    <meta name="keywords" content="defi, crypto, web3, portfolio tracker, coingecko, binance, ai, blockchain">
    <title>{% block title %}KhomDev DeFi Tracker - Web3 Intelligence{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'dashboard_home' %}" class="logo">KhomDev DeFi</a>
        <div class="nav-links">
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard_home' %}">Dashboard</a>
                <span style="color: var(--text-muted); font-size: 0.9rem;">{{ user.username }}</span>
                <form method="post" action="{% url 'logout' %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn-nav-logout">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}" class="btn btn-primary" style="padding: 0.5rem 1.25rem; font-size: 0.9rem; width: auto;">Get Started</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
